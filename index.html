<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />

		<!-- Font -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Funnel+Display&display=swap" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

		<!-- Pure CSS -->
		<!-- <link rel="stylesheet" href="./src/css/style.css" /> -->

		<!-- Tailwind CSS -->
		<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
		<style type="text/tailwindcss">
			@theme {
				--color-primary: #191f28;
				--color-gray: #141a22;
				--color-soft-gray: #4b5975;
				--color-accent: #c69f68;
				--color-soft-accent: #ccccb5;

				--font-display: "Funnel Display";
				--font-mono: "Roboto Mono";
				--aspect-retro: 1 / 1;
			}
		</style>

		<title>Gerry</title>
	</head>
	<body class="font-sans text-accent bg-primary">
		<div class="max-w-7xl mx-auto px-4">
			<header class="h-20 flex items-center">
				<h2 id="logo" class="font-display text-xl font-semibold uppercase">Gerry</h2>
			</header>

			<main>
				<section id="hero" class="py-28 sm:py-38">
					<div>
						<div class="flex flex-col gap-y-14 font-display">
							<h2 class="text-8xl font-semibold">
								Hi 👋, <br />
								I'm <span class="underline text-soft-accent">Gerry.</span>
							</h2>

							<p class="text-xl">
								I'm a web developer <br />
								passionate about building accessible web apps <br />
								that users love.
							</p>

							<a
								href="https://www.github.com/gerrygeop"
								class="text-primary font-mono font-2xl font-semibold tracking-wider uppercase rounded-lg bg-accent hover:bg-soft-accent transition-color duration-200 w-fit px-4 py-2"
								target="_blank"
								rel="noreferrer noopener"
							>
								Contact me
							</a>
						</div>
					</div>
				</section>

				<div class="border-t"></div>

				<section id="projects" class="py-28 sm:py-38">
					<h2 class="text-7xl font-display font-bold mb-14">Projects</h2>

					<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="list-project"></div>
				</section>
			</main>

			<footer class="pb-20 pt-10 border-t grid grid-cols-2">
				<h1 class="text-4xl font-display font-bold uppercase">Gerry</h1>
				<div>
					<ul class="flex justify-end gap-x-4">
						<li>Github</li>
						<li>LinkedIn</li>
						<li>Twiter/X</li>
					</ul>
				</div>
			</footer>
		</div>

		<script src="./src/js/script.js"></script>
	</body>
</html>
